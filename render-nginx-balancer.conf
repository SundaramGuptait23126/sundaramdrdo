worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Compression optimizations for global network requests
    gzip on;
    gzip_types application/json text/plain text/css application/javascript;

    # -------------------------------------------------------------------
    # DISTRIBUTED UPSTREAM BALANCER (ACROSS TWO SEPARATE RENDER ACCOUNTS)
    # -------------------------------------------------------------------
    upstream distributed_property_service {
        # Both instances point to external Render Web Services via HTTPS
        # Use port 443 since Render enforces secure TLS connections
        server property-service-account1.onrender.com:443;
        server property-service-account2.onrender.com:443;

        # Keep alive connection reuse to speed up TLS handshakes to Render
        keepalive 32;
    }

    server {
        listen 80;
        server_name localhost; # Or your edge server's domain/IP

        # Add tracking headers
        add_header X-Scaled-By "Multi-Account Distributed Edge Proxy";

        location /api/properties/ {
            # Proxying over HTTPS to satisfy Render's routing edge requirements
            proxy_pass https://distributed_property_service/api/properties/;
            
            # Necessary headers for properly routing SNI handshakes to shared IP cloud hosting
            proxy_ssl_server_name on; # CRITICAL for Render Cloudflare proxy to recognize host
            proxy_set_header Host $proxy_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Keep alive integration
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }
    }
}
