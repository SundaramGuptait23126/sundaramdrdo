worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Compression optimizations for global network requests
    gzip on;
    gzip_types application/json text/plain text/css application/javascript;

    # DNS Resolver for dynamic proxy_pass
    resolver 8.8.8.8 1.1.1.1 valid=30s;

    # -------------------------------------------------------------------
    # DISTRIBUTED API GATEWAY BALANCER WITH POST BODY FAILOVER
    # -------------------------------------------------------------------

    # Upstream to local endpoints so we can use proxy_next_upstream for POST requests
    upstream api_backends {
        server 127.0.0.1:8001 max_fails=1 fail_timeout=10s;
        server 127.0.0.1:8002 backup;
    }

    # Main Edge Proxy Server
    server {
        listen 80;
        server_name _;

        # Add tracking headers
        add_header X-Scaled-By "Apna Ghar Nginx Cloud Proxy";

        location /api/ {
            proxy_pass http://api_backends/api/;
            
            # Failover logic: retry on errors, INCLUDING POST requests (non_idempotent)
            proxy_next_upstream error timeout http_500 http_502 http_503 http_504 http_429 non_idempotent;
            proxy_next_upstream_tries 2;
            
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Keep alive integration
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }

        # Render health check ping on root path
        location / {
            default_type text/plain;
            return 200 "Apna Ghar Nginx Load Balancer is Running\n";
        }

        location /health {
            default_type text/plain;
            return 200 "healthy\n";
        }
    }

    # Internal Server for Primary Gateway
    server {
        listen 8001;
        
        location /api/ {
            proxy_pass https://apnaghar-gateway.onrender.com/api/;
            
            proxy_ssl_server_name on;
            proxy_ssl_name apnaghar-gateway.onrender.com;
            proxy_set_header Host apnaghar-gateway.onrender.com;
            
            # Nginx will automatically pass X-Real-IP and X-Forwarded-For from the main server
            add_header X-Routed-To "apnaghar-gateway.onrender.com" always;
            
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }
    }

    # Internal Server for Failover Gateway
    server {
        listen 8002;
        
        location /api/ {
            proxy_pass https://apnaghar-gateway-mirror.onrender.com/api/;
            
            proxy_ssl_server_name on;
            proxy_ssl_name apnaghar-gateway-mirror.onrender.com;
            proxy_set_header Host apnaghar-gateway-mirror.onrender.com;
            
            add_header X-Routed-To "apnaghar-gateway-mirror.onrender.com (Failover)" always;
            
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }
    }
}
