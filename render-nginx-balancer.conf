worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Compression optimizations for global network requests
    gzip on;
    gzip_types application/json text/plain text/css application/javascript;

    # -------------------------------------------------------------------
    # DISTRIBUTED API GATEWAY BALANCER (ACROSS TWO SEPARATE RENDER ACCOUNTS)
    # -------------------------------------------------------------------
    # We use a primary/fallback approach because Nginx OSS does not support 
    # dynamic SNI/Host headers per server in an upstream block for external domains.

    server {
        listen 80;
        server_name localhost; # Or your edge server's domain/IP

        # Add tracking headers
        add_header X-Scaled-By "Multi-Account Distributed Edge Proxy";

        # Forward ALL frontend API requests to the primary API Gateway
        location /api/ {
            # Catch backend errors and pass to fallback server
            proxy_intercept_errors on;
            # Includes standard error codes and Cloudflare specific errors (521, 522, 523)
            error_page 500 502 503 504 521 522 523 = @fallback;

            proxy_pass https://apnaghar-gateway.onrender.com/api/;

            # Necessary headers for properly routing SNI handshakes to shared IP cloud hosting
            proxy_ssl_server_name on; # CRITICAL for Render Cloudflare proxy to recognize host
            proxy_ssl_name apnaghar-gateway.onrender.com;
            proxy_set_header Host apnaghar-gateway.onrender.com;
            
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Keep alive integration
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }

        # Failover logic: transfer traffic to the working server if the primary fails
        location @fallback {
            proxy_pass https://apnaghar-gateway-mirror.onrender.com/api/;

            # Ensure tracking headers reflect fallback routing
            add_header X-Scaled-By "Multi-Account Distributed Edge Proxy (Fallback)" always;

            # SNI and Host headers specifically for the mirror
            proxy_ssl_server_name on;
            proxy_ssl_name apnaghar-gateway-mirror.onrender.com;
            proxy_set_header Host apnaghar-gateway-mirror.onrender.com;
            
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Keep alive integration
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }
    }
}
