worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Compression optimizations for global network requests
    gzip on;
    gzip_types application/json text/plain text/css application/javascript;

    # -------------------------------------------------------------------
    # DISTRIBUTED API GATEWAY BALANCER (ACROSS TWO SEPARATE RENDER ACCOUNTS)
    # -------------------------------------------------------------------
    upstream distributed_api_gateway {
        # Both Gateways route to internal microservices within their respective Render accounts
        server apnaghar-gateway-mirror.onrender.com:443 max_fails=3 fail_timeout=30s;
        server apnaghar-gateway.onrender.com:443 max_fails=3 fail_timeout=30s;

        # Keep alive connection reuse to speed up TLS handshakes to Render
        keepalive 32;
    }

    server {
        listen 80;
        server_name localhost; # Or your edge server's domain/IP

        # Add tracking headers
        add_header X-Scaled-By "Multi-Account Distributed Edge Proxy";

        # Forward ALL frontend API requests to the distributed API Gateways
        location /api/ {
            proxy_pass https://distributed_api_gateway/api/;

            # Failover logic: transfer traffic to the working server if one fails
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 10s;
            
            # Necessary headers for properly routing SNI handshakes to shared IP cloud hosting
            proxy_ssl_server_name on; # CRITICAL for Render Cloudflare proxy to recognize host
            proxy_set_header Host $proxy_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Keep alive integration
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }
    }
}
