worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Compression optimizations for global network requests
    gzip on;
    gzip_types application/json text/plain text/css application/javascript;

    # DNS Resolver for dynamic proxy_pass
    resolver 8.8.8.8 1.1.1.1 valid=30s;

    # -------------------------------------------------------------------
    # DISTRIBUTED API GATEWAY BALANCER WITH FAILOVER
    # -------------------------------------------------------------------

    server {
        # Nginx will listen on port 80 inside the Docker container. 
        # Render will automatically route external HTTPS traffic to this port.
        listen 80;
        server_name _;

        # Add tracking headers
        add_header X-Scaled-By "Apna Ghar Nginx Cloud Proxy";

        # Forward ALL frontend API requests to the distributed API Gateways
        location /api/ {
            # Catch backend errors and pass to failover
            proxy_intercept_errors on;
            error_page 500 502 503 504 = @failover;
            
            # Primary Backend
            proxy_pass https://apnaghar-gateway.onrender.com;
            
            # SNI and Host Headers
            proxy_ssl_server_name on;
            proxy_ssl_name apnaghar-gateway.onrender.com;
            proxy_set_header Host apnaghar-gateway.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Keep alive integration
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
            
            # Ensure proper tracking header
            add_header X-Routed-To "apnaghar-gateway.onrender.com" always;
        }

        location @failover {
            # Fallback Backend
            proxy_pass https://apnaghar-gateway-mirror.onrender.com;
            
            # SNI and Host Headers
            proxy_ssl_server_name on;
            proxy_ssl_name apnaghar-gateway-mirror.onrender.com;
            proxy_set_header Host apnaghar-gateway-mirror.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Keep alive integration
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
            
            # Ensure proper tracking header
            add_header X-Routed-To "apnaghar-gateway-mirror.onrender.com (Failover)" always;
        }

        # Render health check ping on root path
        location / {
            default_type text/plain;
            return 200 "Apna Ghar Nginx Load Balancer is Running\n";
        }

        # Healthcheck endpoint (Good for Render)
        location /health {
            default_type text/plain;
            return 200 "healthy\n";
        }
    }
}
