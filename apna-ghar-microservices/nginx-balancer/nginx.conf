worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Compression optimizations for global network requests
    gzip on;
    gzip_types application/json text/plain text/css application/javascript;

    # DNS Resolver for dynamic proxy_pass
    resolver 8.8.8.8 1.1.1.1 valid=30s;

    # -------------------------------------------------------------------
    # DISTRIBUTED API GATEWAY BALANCER
    # -------------------------------------------------------------------
    # This splits incoming traffic 50/50 between the two Render gateways
    split_clients "${remote_addr}${remote_port}${msec}" $backend_host {
        50%     "apnaghar-gateway-mirror.onrender.com";
        *       "apnaghar-gateway.onrender.com";
    }

    server {
        # Nginx will listen on port 80 inside the Docker container. 
        # Render will automatically route external HTTPS traffic to this port.
        listen 80;
        server_name _;

        # Add tracking headers
        add_header X-Scaled-By "Apna Ghar Nginx Cloud Proxy";
        add_header X-Routed-To $backend_host;

        # Forward ALL frontend API requests to the distributed API Gateways
        location /api/ {
            # Use dynamic backend host to ensure Render gets the correct SNI Hostname
            proxy_pass https://$backend_host$request_uri;
            
            # SNI and Host Headers
            proxy_ssl_server_name on;
            proxy_ssl_name $backend_host;
            proxy_set_header Host $backend_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Keep alive integration
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }

        # Render health check ping on root path
        location / {
            default_type text/plain;
            return 200 "Apna Ghar Nginx Load Balancer is Running\n";
        }

        # Healthcheck endpoint (Good for Render)
        location /health {
            default_type text/plain;
            return 200 "healthy\n";
        }
    }
}
