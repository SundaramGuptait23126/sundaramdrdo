worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Compression optimizations for global network requests
    gzip on;
    gzip_types application/json text/plain text/css application/javascript;

    # -------------------------------------------------------------------
    # DISTRIBUTED API GATEWAY BALANCER
    # -------------------------------------------------------------------
    upstream distributed_api_gateway {
        # Both Gateways route to internal microservices within their respective Render accounts
        server apnaghar-gateway-mirror.onrender.com:443;
        server apnaghar-gateway.onrender.com:443;

        # Keep alive connection reuse to speed up TLS handshakes to Render
        keepalive 32;
    }

    server {
        # Nginx will listen on port 80 inside the Docker container. 
        # Render will automatically route external HTTPS traffic to this port.
        listen 80;
        server_name _;

        # Add tracking headers
        add_header X-Scaled-By "Apna Ghar Nginx Cloud Proxy";

        # Forward ALL frontend API requests to the distributed API Gateways
        location /api/ {
            proxy_pass https://distributed_api_gateway/api/;
            
            # Necessary headers for properly routing SNI handshakes to shared IP cloud hosting
            proxy_ssl_server_name on; # CRITICAL for Render Cloudflare proxy to recognize host
            proxy_set_header Host $proxy_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Keep alive integration
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }

        # Render health check ping on root path
        location / {
            default_type text/plain;
            return 200 "Apna Ghar Nginx Load Balancer is Running\n";
        }

        # Healthcheck endpoint (Good for Render)
        location /health {
            default_type text/plain;
            return 200 "healthy\n";
        }
    }
}
