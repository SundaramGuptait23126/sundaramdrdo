name: Keep Render Services Alive

on:
  schedule:
    # Run every 10 minutes to prevent Render free tier from sleeping (sleeps after 15 mins)
    - cron: "*/10 * * * *"
  workflow_dispatch: # Allows manual triggering

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API Gateway
        run: |
          curl -s https://apnaghar-gateway.onrender.com/api/properties/all > /dev/null
          echo "Pinged API Gateway"
