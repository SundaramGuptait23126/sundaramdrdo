name: Keep Render Services Alive

on:
  schedule:
    # Run every 10 minutes to prevent Render free tier from sleeping (sleeps after 15 mins)
    - cron: "*/10 * * * *"
  workflow_dispatch: # Allows manual triggering

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping All Services
        run: |
          curl -s https://apnaghar-gateway.onrender.com/ > /dev/null
          curl -s https://apnaghar-property.onrender.com/ > /dev/null
          curl -s https://apnaghar-auth.onrender.com/ > /dev/null
          curl -s https://apnaghar-media.onrender.com/ > /dev/null
          curl -s https://apnaghar-map.onrender.com/ > /dev/null
          curl -s https://apnaghar-compare.onrender.com/ > /dev/null
          echo "Pinged all microservices"
